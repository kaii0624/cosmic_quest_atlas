<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COSMIC QUEST</title>
    <link rel="stylesheet" href="./styles.css?v=quest-ui-v4" />
  </head>
  <body>
    <div class="star-dust" aria-hidden="true"></div>
    <main class="game-shell">
      <section id="mapStage" class="map-stage" aria-label="天空の大陸ワールドマップ">
        <div id="mapCanvas" class="map-canvas">
          <img
            class="world-art"
            src="./assets/sky-continent-map.png?v=quest-ui-v4"
            alt="天空の大陸の星空RPGワールドマップ"
          />
          <div class="kingdom-layer-stack" aria-hidden="true">
            <img class="kingdom-cutout tower" src="./assets/map-kingdom-layer-tower.png" alt="" />
            <img class="kingdom-cutout spring" src="./assets/map-kingdom-layer-spring.png" alt="" />
            <img class="kingdom-cutout summer" src="./assets/map-kingdom-layer-summer.png" alt="" />
            <img class="kingdom-cutout autumn" src="./assets/map-kingdom-layer-autumn.png" alt="" />
            <img class="kingdom-cutout winter" src="./assets/map-kingdom-layer-winter.png" alt="" />
          </div>
          <div class="kingdom-hotspots" aria-label="王国選択">
            <button class="kingdom-hotspot spring" type="button" data-home-kingdom="spring" aria-label="春の王国を選ぶ"></button>
            <button class="kingdom-hotspot summer" type="button" data-home-kingdom="summer" aria-label="夏の王国を選ぶ"></button>
            <button class="kingdom-hotspot autumn" type="button" data-home-kingdom="autumn" aria-label="秋の王国を選ぶ"></button>
            <button class="kingdom-hotspot winter" type="button" data-home-kingdom="winter" aria-label="冬の王国を選ぶ"></button>
          </div>
          <svg class="route-layer" viewBox="0 0 100 100" aria-hidden="true">
            <path id="routePath" d="" />
          </svg>
          <div class="map-title map-title-logo ornate-frame" aria-label="COSMIC QUEST">
            <img
              class="map-title-logo-image"
              src="./assets/ui-title-cosmic-quest.png"
              alt="COSMIC QUEST"
            />
          </div>
          <div class="compass compass-marker north"><span>北</span></div>
          <div class="compass compass-marker west"><span>西</span></div>
          <div class="compass compass-marker south"><span>南</span></div>
          <div class="compass compass-marker east"><span>東</span></div>
          <button class="region-label kingdom-marker spring" type="button" data-kingdom="spring">春の王国</button>
          <button class="region-label kingdom-marker summer" type="button" data-kingdom="summer">夏の王国</button>
          <button class="region-label kingdom-marker autumn" type="button" data-kingdom="autumn">秋の王国</button>
          <button class="region-label kingdom-marker winter" type="button" data-kingdom="winter">冬の王国</button>
          <button id="towerButton" class="tower-label tower-marker" type="button" data-home-kingdom="tower">天球観測塔</button>
        </div>
        <div id="detailCanvas" class="detail-canvas" aria-label="星域MAP">
          <img
            id="detailArt"
            class="detail-art"
            src="./assets/autumn-kingdom-detail.png"
            alt="王国の詳細星図"
          />
          <svg class="detail-route-layer" viewBox="0 0 100 100" aria-hidden="true">
            <path id="detailRoutePath" d="" />
          </svg>
          <div class="detail-title">
            <span>星域MAP</span>
            <strong id="detailTitleName">秋の王国</strong>
          </div>
          <div id="storyPoints" class="story-points"></div>
        </div>
        <div id="storyScene" class="story-scene" aria-label="ストーリー画面">
          <div class="battle-screen">
            <div id="targetStatusPanel" class="status-panel target-status-panel">
              <div class="status-object">
                <img
                  id="targetStatusThumb"
                  src="./assets/algol-enemy-normal.png"
                  alt="悪魔の首アルゴル"
                />
                <div>
                  <strong id="targetStatusName">悪魔の首アルゴル</strong>
                  <dl id="targetStatusStats" class="status-stats target-stats"></dl>
                </div>
              </div>
              <span class="status-meter gold"><b id="targetStatusMeter"></b></span>
            </div>
            <img
              id="enemySprite"
              class="enemy-sprite"
              src="./assets/algol-enemy-normal.png"
              alt="悪魔の首アルゴル"
            />
            <img
              class="observer-sprite"
              src="./assets/observer-astronomer.png"
              alt="望遠鏡を構える観測者"
            />
            <div id="observerStatusPanel" class="status-panel observer-status-panel">
              <strong>観測者</strong>
              <dl class="status-stats observer-stats">
                <div>
                  <dt><span aria-hidden="true">▤</span>観測知識</dt>
                  <dd>120 / 200</dd>
                  <span class="status-meter blue"><b style="--meter: 60%"></b></span>
                </div>
                <div>
                  <dt><span aria-hidden="true">◎</span>観測精度</dt>
                  <dd>85 %</dd>
                  <span class="status-meter blue"><b style="--meter: 85%"></b></span>
                </div>
                <div>
                  <dt><span aria-hidden="true">⌛</span>観測時間</dt>
                  <dd>60 秒</dd>
                  <span class="status-meter blue"><b style="--meter: 72%"></b></span>
                </div>
              </dl>
            </div>
          </div>
          <div class="story-scene-title">
            <span id="storySceneType">STORY 1</span>
            <strong id="storySceneName">悪魔の首アルゴル</strong>
          </div>
        </div>
        <div id="appScreen" class="app-screen" aria-label="メニュー画面"></div>
        <button id="homeButton" class="map-home-button" type="button">戻る</button>
      </section>

      <section id="storyTextPanel" class="story-text-panel is-hidden" aria-live="polite">
        <button id="storyAdvanceButton" class="story-advance" type="button">
          <span id="storyTextSpeaker" class="story-speaker">悪魔の首アルゴル</span>
          <span id="storyTextLine" class="story-line">
            我が名はアルゴル。隠れるたび、空は悪魔の目を思い出す。
          </span>
          <span class="story-cue" aria-hidden="true">▼</span>
        </button>
      </section>

      <aside class="codex-panel" aria-label="観測手帳">
        <section id="guidePanel" class="guide-panel info-panel ornate-frame" aria-live="polite">
          <div class="home-panel-shell">
            <nav class="home-nav-bar" aria-label="ホームメニュー">
              <button class="home-nav-button tab-home active" type="button" data-home-tab="home" aria-pressed="true">
                <span>ホーム</span>
              </button>
              <button class="home-nav-button tab-observe" type="button" data-home-tab="observe" aria-pressed="false">
                <span>天体を見る</span>
              </button>
              <button class="home-nav-button tab-quests" type="button" data-home-tab="quests" aria-pressed="false">
                <span>クエスト</span>
              </button>
              <button class="home-nav-button tab-library" type="button" data-home-tab="library" aria-pressed="false">
                <span>図書館</span>
              </button>
              <button class="home-nav-button tab-settings" type="button" data-home-tab="settings" aria-pressed="false">
                <span>設定</span>
              </button>
            </nav>
          </div>
        </section>

        <section id="storyPanel" class="story-panel is-hidden" aria-live="polite">
          <span id="storyType" class="stage-type">STORY 1</span>
          <h2 id="storyName">悪魔の首アルゴル</h2>
          <p id="storySubtitle" hidden></p>
        </section>

        <section class="scroll-panel">
          <h2>方程式の巻物</h2>
          <div class="equation-scrolls">
            <figure>
              <img src="./assets/equation-scroll-luminosity.png" alt="質量光度関係の巻物" />
              <figcaption>質量光度関係</figcaption>
            </figure>
            <figure>
              <img src="./assets/equation-scroll-parallax.png" alt="年周視差の巻物" />
              <figcaption>年周視差</figcaption>
            </figure>
            <figure>
              <img src="./assets/equation-scroll-binary.png" alt="連星質量の巻物" />
              <figcaption>連星質量</figcaption>
            </figure>
          </div>
        </section>
      </aside>
    </main>

    <div id="rewardPopup" class="reward-popup is-hidden" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
      <button class="reward-backdrop" type="button" aria-label="巻物獲得を閉じる" data-reward-close></button>
      <section class="reward-card" aria-live="polite">
        <h2 id="rewardTitle">星色と大光度の巻物</h2>
        <p id="rewardMessage">ゲットしました。</p>
        <img
          id="rewardImage"
          class="reward-scroll-image"
          src="./assets/reward-scroll-rigel-luminosity.png"
          alt="獲得した巻物"
        />
        <div class="reward-knowledge">
          <h3 id="rewardKnowledgeTitle" hidden></h3>
          <ul id="rewardKnowledgeList"></ul>
        </div>
        <button id="rewardCloseButton" class="reward-close-button" type="button">星図へ戻る</button>
      </section>
    </div>

    <script src="./script.js?v=quest-ui-v4"></script>
  </body>
</html>
