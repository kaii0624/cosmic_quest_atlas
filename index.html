<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天空の大陸 - 天文宇宙検定RPG</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="star-dust" aria-hidden="true"></div>
    <main class="game-shell">
      <section id="mapStage" class="map-stage" aria-label="天空の大陸ワールドマップ">
        <div id="mapCanvas" class="map-canvas">
          <img
            class="world-art"
            src="./assets/sky-continent-map.png"
            alt="天空の大陸の星空RPGワールドマップ"
          />
          <svg class="route-layer" viewBox="0 0 100 100" aria-hidden="true">
            <path id="routePath" d="" />
          </svg>
          <div class="map-title">
            <span>RPGワールドMAP</span>
            <strong>天空の大陸</strong>
            <em>星座と宇宙をめぐる冒険</em>
          </div>
          <div class="compass north">北</div>
          <div class="compass west">西</div>
          <div class="compass south">南</div>
          <div class="compass east">東</div>
          <button class="region-label spring" type="button" data-kingdom="spring">春の王国</button>
          <button class="region-label summer" type="button" data-kingdom="summer">夏の王国</button>
          <button class="region-label autumn" type="button" data-kingdom="autumn">秋の王国</button>
          <button class="region-label winter" type="button" data-kingdom="winter">冬の王国</button>
          <div class="tower-label">地球の中央観測塔</div>
        </div>
        <div id="detailCanvas" class="detail-canvas" aria-label="星域MAP">
          <img
            id="detailArt"
            class="detail-art"
            src="./assets/autumn-kingdom-detail.png"
            alt="王国の詳細星図"
          />
          <svg class="detail-route-layer" viewBox="0 0 100 100" aria-hidden="true">
            <path id="detailRoutePath" d="" />
          </svg>
          <div class="detail-title">
            <span>星域MAP</span>
            <strong id="detailTitleName">秋の王国</strong>
          </div>
          <div id="storyPoints" class="story-points"></div>
        </div>
        <div id="storyScene" class="story-scene" aria-label="ストーリー画面">
          <div class="battle-screen">
            <div class="enemy-hud battle-hud">
              <span>HP:</span>
              <i><b></b></i>
            </div>
            <img
              id="enemySprite"
              class="enemy-sprite"
              src="./assets/algol-enemy-normal.png"
              alt="悪魔の首アルゴル"
            />
            <div class="observer-sprite" aria-hidden="true">
              <span class="observer-head"></span>
              <span class="observer-body"></span>
              <span class="observer-pack"></span>
              <span class="observer-scope"></span>
            </div>
            <div class="player-hud battle-hud">
              <span>HP:</span>
              <i><b></b></i>
              <strong>20 / 20</strong>
            </div>
          </div>
          <div class="story-scene-title">
            <span id="storySceneType">STORY 1</span>
            <strong id="storySceneName">悪魔の首アルゴル</strong>
          </div>
        </div>
        <button id="homeButton" class="map-home-button" type="button">戻る</button>
      </section>

      <aside class="codex-panel" aria-label="観測手帳">
        <header class="panel-header">
          <span>天文宇宙検定2級</span>
          <h1 id="panelTitle">天空の大陸</h1>
          <p id="panelLead">星座と神話が重なる天空の星図。</p>
        </header>

        <section id="guidePanel" class="guide-panel" aria-live="polite">
          <h2>中央観測塔</h2>
          <p>
            見かけの星座の向こうに、恒星、星雲、銀河の奥行きが眠っている。
          </p>
          <div class="guide-steps">
            <span>春の王国</span>
            <span>夏の王国</span>
            <span>秋の王国</span>
            <span>冬の王国</span>
          </div>
        </section>

        <section id="storyPanel" class="story-panel is-hidden" aria-live="polite">
          <div class="portrait-shell">
            <div id="portrait" class="portrait algol"></div>
            <div id="aura" class="aura"></div>
          </div>
          <div class="encounter-copy">
            <span id="storyType" class="stage-type">ストーリー1</span>
            <h2 id="storyName">悪魔の首アルゴル</h2>
            <p id="storySubtitle">悪魔の星そのもの</p>
            <div id="dialog" class="dialog"></div>
          </div>
          <div id="storyMechanic" class="story-mechanic">
            <div class="light-curve" aria-label="アルゴルの光度曲線">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <p id="storyRule">光度曲線の谷が「食」のタイミング。</p>
          </div>
          <div class="season-switcher" aria-label="星域背景">
            <button type="button" data-battle-bg="spring">春</button>
            <button type="button" data-battle-bg="summer">夏</button>
            <button type="button" data-battle-bg="autumn" class="active">秋</button>
            <button type="button" data-battle-bg="winter">冬</button>
          </div>
          <button id="nextStoryButton" class="primary-action" type="button">次へ</button>
        </section>

        <section class="scroll-panel">
          <h2>方程式の巻物</h2>
          <div class="equation-scrolls">
            <figure>
              <img src="./assets/equation-scroll-luminosity.png" alt="質量光度関係の巻物" />
              <figcaption>質量光度関係</figcaption>
            </figure>
            <figure>
              <img src="./assets/equation-scroll-parallax.png" alt="年周視差の巻物" />
              <figcaption>年周視差</figcaption>
            </figure>
            <figure>
              <img src="./assets/equation-scroll-binary.png" alt="連星質量の巻物" />
              <figcaption>連星質量</figcaption>
            </figure>
          </div>
        </section>
      </aside>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
